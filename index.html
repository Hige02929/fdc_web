<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FDC Web</title>

    <style>
        body {
            background: #000;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        .addon-box {
            max-width: 400px;
            margin: 20px auto;
            padding: 20px;
            background: #111;
            border: 2px solid #333;
            border-radius: 10px;
        }

        img {
            width: 150px;
            border-radius: 10px;
        }

        .btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>

<body>

<h1>FDC Boss</h1>

<div class="addon-box">
    <img src="https://via.placeholder.com/150" alt="Flash Killer">

    <h2>Flash Killer</h2>

    <p>Attack : ★★★★★☆☆☆☆☆</p>
    <p>Power : ★★★★★★★★☆☆</p>
    <p>Movement : ★★★☆☆☆☆☆☆☆</p>
    <p>Version : 1.26.30</p>

    <a class="btn" href="https://example.com">
        Download Flash Killer
    </a>
</div>

<div class="addon-box">
    <img src="https://via.placeholder.com/150" alt="Addon 2">

    <h2>Addon Tambahan</h2>

    <p>Attack : ★★★★★★★★★☆</p>
    <p>Power : ★★★★☆☆☆☆☆☆</p>
    <p>Movement : ★★★★★★★★★★</p>

    <a class="btn" href="#">
        Download Addon 2
    </a>
</div>

</body>
</html>
