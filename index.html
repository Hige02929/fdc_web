<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-sca>
    <title>FDC Web</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
        }
        .container { max-width: 400px; margin: auto; }
        .addon-box {
            border: 2px solid #333;
            padding: 20px;
            margin: 20px 0;
            border-radius: 10px;
            background-color: #111;
        }
        img {
            width: 100%;
            max-width: 150px;
            height: auto;
            border-radius: 5px;
            margin-bottom: 10px;
        }
        .stats {
            margin: 10px 0;
            font-size: 14px;
            text-align: left;
            display: inline-block;
        }
        .stats p { margin: 5px 0; }
        .btn {
            display: block;
            margin-top: 15px;
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>FDC Boss</h1>

    <div class="addon-box">
        <img src="https://www.image2url.com/r2/default/images/1783>
        <h2>Flash Killer</h2>
        <div class="stats">
            <p>Attack: ★(5/10)</p>
            <p>Power: ★(8/10)</p>
            <p>Movement: ★(3/10)</p>
            <p>Version: 1.26.30</p>
        </div>
        <a href="https://www.dropbox.com/scl/fi/mg3tjgddyknzx0inhy>
    </div>

    <div class="addon-box">
        <img src="https://via.placeholder.com/150" alt="Addon 2">
        <h2>Addon Tambahan</h2>
        <div class="stats">
            <p>Attack: ★(9/10)</p>
            <p>Power: ★(4/10)</p>
            <p>Movement: ★(10/10)</p>
        </div>
        <a href="#" class="btn">Download Addon 2</a>
    </div>
</body>
</html>
