<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FDC Web</title>

    <style>
        body {
            background: #000;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        .addon-box {
            max-width: 400px;
            margin: 20px auto;
            padding: 20px;
            background: #111;
            border: 2px solid #333;
            border-radius: 10px;
        }

        img {
            width: 150px;
            border-radius: 10px;
        }

        .btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>

<body>

<h1>FDC Boss</h1>

    <img src="https://www.image2url.com/r2/default/images/1783538334963-157fa0ad-4249-4e8a-84ba-71b42766c900.png" alt="Flash Killer">

    <h2>Flash Killer</h2>

    <p>Attack : 3/10</p>
    <p>Power : 5/10</p>
    <p>Movement : 8/10</p>
    <p>Version : 1.26</p>

        Download :)
    </a>
</div>

<div class="addon-box">
    <img src="https://img.sanishtech.com/u/6dbb1890a03a91aa95edd704036abfce.png" alt="Addon 2">

</html>
